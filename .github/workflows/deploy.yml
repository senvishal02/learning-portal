name: Deploy MkDocs to GitHub Pages

env:
  PYTHON_VERSION: "3.11"

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [content-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs Site
    runs-on: ubuntu-latest
    steps:
      # ── Log trigger source ────────────────────────────────────
      - name: Log trigger context
        run: |
          echo "=== Build Triggered ==="
          echo "Event:        ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Source repo:  ${{ github.event.client_payload.source_repo }}"
            echo "Branch:       ${{ github.event.client_payload.source_branch }}"
            echo "Commit SHA:   ${{ github.event.client_payload.commit_sha }}"
            echo "Triggered by: ${{ github.event.client_payload.triggered_by }}"
          fi
          echo "======================="

      - name: Checkout portal repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs dependencies
        run: pip install -r requirements.txt

      # ── Clone all content repos ───────────────────────────────
      - name: Clone content repositories
        run: |
          clone_repo() {
            local repo=$1 target=$2
            echo "→ Cloning senvishal02/${repo} into ${target}"
            rm -rf "$target"
            if git clone --depth 1 --quiet \
              "https://github.com/senvishal02/${repo}.git" "$target"; then
              echo "  ✅ ${repo} cloned successfully"
            else
              echo "  ⚠️  WARNING: ${repo} clone failed — ${target} will be empty"
              mkdir -p "$target"
            fi
          }

          clone_repo "courses"       "docs/courses"
          clone_repo "interview-prep" "docs/interview-prep"
          clone_repo "labs"          "docs/labs"
          clone_repo "projects"      "docs/projects"
          clone_repo "cheatsheets"   "docs/cheatsheets"
          clone_repo "roadmap"       "docs/roadmap"

      # ── Build ─────────────────────────────────────────────────
      - name: Build MkDocs site
        env:
          ENABLE_GIT_DATES: "true"
          ENABLE_MINIFY: "true"
        run: mkdocs build --strict

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
