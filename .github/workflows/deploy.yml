name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout portal repo
        uses: actions/checkout@v4

      - name: Clone courses repo
        run: |
          git clone https://github.com/senvishal02/courses.git docs/courses

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Deploy site
        run: mkdocs gh-deploy --force
