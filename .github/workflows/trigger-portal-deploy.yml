# .github/workflows/trigger-portal-deploy.yml
# ─────────────────────────────────────────────────────────────────
# PURPOSE: Triggers a rebuild of the main learning portal site
#          whenever this content repository is updated on main.
#
# REQUIRED SECRET: PORTAL_DISPATCH_TOKEN
#   → A fine-grained PAT with Actions:write on senvishal02/learning-portal
#   → Add via: Repo Settings → Secrets and variables → Actions
# ─────────────────────────────────────────────────────────────────

name: Trigger Portal Rebuild

on:
  push:
    branches: [main]
    paths:
      - "**.md"    # Trigger only on Markdown content changes
      - "**.yml"   # Or config/nav changes

jobs:
  dispatch:
    name: Notify learning-portal
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to learning-portal
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PORTAL_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'senvishal02',
              repo:  'learning-portal',
              event_type: 'content-update',
              client_payload: {
                source_repo:   '${{ github.repository }}',
                source_branch: '${{ github.ref_name }}',
                commit_sha:    '${{ github.sha }}',
                triggered_by:  '${{ github.actor }}'
              }
            });
            console.log('✅ Dispatch sent to senvishal02/learning-portal');
