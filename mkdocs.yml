# ── Site Identity ─────────────────────────────────────────────────────────────
site_name: Vishal Sen | DevOps & MLOps Engineering
site_author: Vishal Sen
site_url: https://learning.vishal-connect.com
site_description: >-
  Production-grade learning platform for DevOps, MLOps, AIOps —
  structured courses, hands-on labs, real-world projects,
  interview preparation, and professional portfolio.

# ── Repository ────────────────────────────────────────────────────────────────
repo_name: senvishal02/learning-portal
repo_url: https://github.com/senvishal02/learning-portal
edit_uri: edit/main/docs/

# ── Theme ─────────────────────────────────────────────────────────────────────
theme:
  name: material
  custom_dir: overrides

  # Favicon & Logo
  # logo: assets/images/logo.png
  # favicon: assets/images/favicon.png

  # Color palette — Professional dark/light toggle
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to system preference

  # Typography
  font:
    text: Inter
    code: JetBrains Mono

  # Icons
  icon:
    repo: fontawesome/brands/github
    annotation: material/arrow-right-circle
    logo: material/infinity
    edit: material/pencil
    view: material/eye

    # Admonition icons
    admonition:
      note: material/pencil-circle
      abstract: material/clipboard-text
      info: material/information
      tip: material/fire
      success: material/check-circle
      question: material/help-circle
      warning: material/alert
      failure: material/close-circle
      danger: material/lightning-bolt-circle
      bug: material/bug
      example: material/test-tube
      quote: material/format-quote-close

  # Feature flags
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.indexes
    - navigation.path

    # Content
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - content.tooltips

    # Search
    - search.suggest
    - search.highlight
    - search.share

    # Table of Contents
    - toc.follow

    # Header
    - header.autohide
    - announce.dismiss

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  # Search
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

  # Blog
  - blog:
      blog_dir: blog
      blog_toc: true
      post_date_format: long
      post_url_format: "{date}/{slug}"
      post_url_max_categories: 2
      archive: true
      archive_name: Archive
      archive_date_format: yyyy
      categories: true
      categories_name: Categories
      categories_toc: true
      authors: true
      draft: true
      draft_if_future_date: true

  # Tags
  - tags

  # Git revision dates
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

  # Minify output
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

# ── Markdown Extensions ───────────────────────────────────────────────────────
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Standard
  - abbr
  - admonition
  - md_in_html
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables

  # Table of Contents
  - toc:
      permalink: true
      title: On this page
      toc_depth: 3

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: senvishal02
      repo: learning-portal
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: docs
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.critic

# ── Extra JavaScript & CSS ────────────────────────────────────────────────────
extra_javascript:
  # MathJax
  - assets/js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  # Custom
  - assets/js/extra.js

extra_css:
  - assets/css/extra.css

# ── Extra Config ──────────────────────────────────────────────────────────────
extra:
  # Hide generator notice
  generator: false

  # Announcement bar
  announce:
    text: >-
      🚀 <strong>Welcome to the DevOps & MLOps Engineering Hub</strong> —
      Courses, Labs, Projects & Interview Prep.
      <a href="https://youtube.com/@senvishal02">Subscribe on YouTube</a>

  # Google Analytics
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, '']
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: Helpful
          data: 1
          note: Thanks for your feedback!

        - icon: material/thumb-down-outline
          name: Not helpful
          data: 0
          note: >-
            Thanks for letting me know! You can
            <a href="https://github.com/senvishal02/learning-portal/issues/new?title=[Feedback]"
               target="_blank" rel="noopener">open an issue</a> with suggestions.

  # Cookie consent (GDPR)
  consent:
    title: Cookie consent
    description: >-
      This site uses cookies to measure traffic and recognise your preferences.
      With your consent, you help make the content better.
    actions:
      - accept
      - reject
      - manage

  # Social links (footer)
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@senvishal02
      name: YouTube Channel

    - icon: fontawesome/brands/github
      link: https://github.com/senvishal02
      name: GitHub Profile

    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/senvishal02
      name: LinkedIn

    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/senvishal02
      name: Docker Hub

  # Page status indicators
  status:
    new: Recently Added
    deprecated: Deprecated

# ── Copyright ─────────────────────────────────────────────────────────────────
